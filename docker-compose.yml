services:

  postgres:
    image: postgres:16
    container_name: healthcare_postgres

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5



  pgadmin:
    image: dpage/pgadmin4

    container_name: healthcare_pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@healthcare.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy



  airflow-init:

    build: ./airflow

    container_name: airflow_init

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username $$AIRFLOW_ADMIN_USERNAME
      --password $$AIRFLOW_ADMIN_PASSWORD
      --firstname $$AIRFLOW_ADMIN_FIRSTNAME
      --lastname $$AIRFLOW_ADMIN_LASTNAME
      --role Admin
      --email $$AIRFLOW_ADMIN_EMAIL
      "

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_db

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_project:/opt/airflow/dbt_project



  airflow-webserver:

    build: ./airflow

    container_name: airflow_webserver

    restart: unless-stopped

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    ports:
      - "8085:8080"

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_db

    command: webserver

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_project:/opt/airflow/dbt_project



  airflow-scheduler:

    build: ./airflow

    container_name: airflow_scheduler

    restart: unless-stopped

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_db

    command: scheduler

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_project:/opt/airflow/dbt_project



  superset:

    image: apache/superset

    container_name: healthcare_superset

    restart: unless-stopped

    ports:
      - "8080:8088"

volumes:

  postgres_data: