services:
  
  postgres:
    image: postgres:16
    container_name: healthcare_postgres
    restart: always

    environment:
      POSTGRES_DB: healthcare_dw
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  superset:
    image: apache/superset
    container_name: healthcare_superset

    ports:
      - "8080:8080"

    environment:
      SUPERSET_SECRET_KEY: healthcare_secret

    depends_on:
      - postgres

volumes:
  postgres_data: